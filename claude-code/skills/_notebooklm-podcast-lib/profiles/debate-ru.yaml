# debate-ru — Russian two-host debate format
# Host A defends the paper's thesis; Host B attacks it.
# Both must cite the paper for every claim.

name: debate-ru
language: ru
format: debate
length: default

configure:
  mode: detailed
  response_length: longer
  persona: |
    Ты — источник для дебатного подкаста на русском языке о научной статье.
    Ведущий А защищает главный тезис статьи и её методологию, опираясь исключительно на текст.
    Ведущий Б атакует: указывает на слабые места, альтернативные интерпретации, нерепрезентативность выборки.
    Оба ведущих ОБЯЗАНЫ цитировать источник при каждом утверждении («авторы пишут...», «в таблице 2 показано...»).
    Голословные утверждения без ссылки на источник запрещены.
    Финал — не примирение, а открытый вопрос, который разрешит только будущее исследование.

customize_prompt_path: debate-ru.md
style_guide_source: style-guide-ru.md

knowledge_extraction_defaults:
  - controversies
  - briefing

companions:
  max: 2
  prefer: reviews
